<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gerenciador de candidaturas{% endblock %}</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 32px 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
    }
    a {
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
    }
    nav a { margin-left: 16px; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .metric,
    table,
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .metric { padding: 16px; }
    .metric strong {
      display: block;
      font-size: 30px;
      margin-bottom: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }
    tr:last-child td { border-bottom: 0; }
    .empty {
      padding: 20px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .card {
      max-width: 420px;
      margin: 48px auto;
      padding: 28px;
    }
    .card form p { margin: 0 0 16px; }
    .card label { display: block; font-weight: 700; margin-bottom: 4px; }
    .card input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 15px;
    }
    button, .btn {
      background: #0f766e;
      color: #ffffff;
      border: 0;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .errorlist { color: #b91c1c; list-style: none; padding: 0; margin: 4px 0; }
    .help { color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1><a href="/">Gerenciador de candidaturas</a></h1>
      <nav>
        {% if user.is_authenticated %}
          <a href="/admin/">Admin</a>
          <a href="{% url 'account_logout' %}">Sair</a>
        {% else %}
          <a href="{% url 'account_login' %}">Entrar</a>
          <a href="{% url 'account_signup' %}">Cadastrar</a>
        {% endif %}
      </nav>
    </header>

    {% block content %}{% endblock %}
  </main>
</body>
</html>
