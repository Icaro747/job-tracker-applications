{% extends "base.html" %}

{% block title %}Sair — Gerenciador de candidaturas{% endblock %}

{% block content %}
  <div class="card">
    <h2>Sair</h2>
    <p>Deseja realmente encerrar a sessao?</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      {% if redirect_field_value %}
        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
      {% endif %}
      <button type="submit">Sair</button>
    </form>
  </div>
{% endblock %}
