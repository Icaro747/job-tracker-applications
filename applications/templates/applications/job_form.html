{% extends "base.html" %}
{% block title %}{% if form.instance.pk %}Editar vaga{% else %}Nova vaga{% endif %}{% endblock %}

{% block content %}
  <div class="card">
    <h2>{% if form.instance.pk %}Editar vaga{% else %}Nova vaga{% endif %}</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button type="submit">Salvar</button>
        <a href="{% url 'applications:job_list' %}">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
