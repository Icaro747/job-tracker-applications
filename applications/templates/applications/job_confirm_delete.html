{% extends "base.html" %}
{% block title %}Excluir vaga{% endblock %}

{% block content %}
  <div class="card">
    <h2>Excluir vaga</h2>
    <p>Tem certeza que deseja excluir <strong>{{ job.role_title }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <div class="actions">
        <button type="submit" class="btn-danger">Excluir</button>
        <a href="{% url 'applications:job_detail' job.pk %}">Cancelar</a>
      </div>
    </form>
  </div>
{% endblock %}
